name: Build RoadSoS Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # needed to create releases

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: Install Capacitor dependencies
        run: |
          npm install --no-audit --no-fund

      - name: Initialise Capacitor Android project
        run: |
          npx cap add android || npx cap sync android
          npx cap sync android

      - name: Patch Android Manifest for required permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # SMS-Bridge (Blueprint 6.A) — optional silent SMS permission
          sed -i 's|<application |<uses-permission android:name="android.permission.SEND_SMS"/>\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <application |' "$MANIFEST"
          echo "----- AndroidManifest.xml -----"
          cat "$MANIFEST"

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/RoadSoS-debug.apk
          ls -lh dist/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoadSoS-debug-apk
          path: dist/RoadSoS-debug.apk
          retention-days: 30

      - name: Create / update GitHub Release with APK
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "Latest RoadSoS APK"
          body: |
            **Auto-built RoadSoS Android APK** — built from commit `${{ github.sha }}`.

            ## Install
            1. Download `RoadSoS-debug.apk` from the assets below.
            2. On your Android phone, tap the file → "Install" (you may need to allow "Install from unknown sources" once).
            3. Grant location / motion / mic / camera permissions when asked.

            ## Backend
            This APK loads the bundled HTML/JS shell. For full AI chat and nearby-services it talks to the FastAPI backend in `roadsos/app/`. Either:
            - Edit `static/js/app.js` `const API = ''` to point to your deployed backend URL, then re-push (a new APK will be built), OR
            - Use Path A (PWA install) which talks to localhost on the same WiFi.

            Built by GitHub Actions · commit ${{ github.sha }}
          files: dist/RoadSoS-debug.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
